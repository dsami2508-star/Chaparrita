<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chaparrita ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Arial',sans-serif;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#ff0080 0%,transparent 40%),
radial-gradient(circle at bottom,#5f00ff 0%,transparent 40%);
opacity:.4;
}

.container{
position:relative;
z-index:10;
text-align:center;
padding:20px;
max-width:500px;
}

.titulo{
font-size:4rem;
font-weight:bold;
color:#fff;
text-shadow:
0 0 10px #ff2d75,
0 0 20px #ff2d75,
0 0 40px #ff2d75,
0 0 80px #ff2d75;
animation:latido 2s infinite;
}

@keyframes latido{
50%{
transform:scale(1.05);
}
}

.sub{
font-size:1.2rem;
margin:15px 0;
}

.foto{
width:280px;
height:280px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:4px solid #ff2d75;
box-shadow:
0 0 20px #ff2d75,
0 0 50px #ff2d75,
0 0 80px #ff2d75;
animation:zoom 6s infinite alternate;
}

.foto img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.mensaje{
margin-top:20px;
font-size:1.4rem;
min-height:60px;
text-shadow:0 0 15px #ff2d75;
}

.pregunta{
margin-top:15px;
font-size:1.8rem;
}

button{
padding:15px 30px;
margin:10px;
border:none;
border-radius:40px;
font-size:22px;
cursor:pointer;
}

#si{
background:#ff2d75;
color:white;
box-shadow:0 0 20px #ff2d75;
}

#no{
background:white;
}

.corazon{
position:absolute;
animation:caer linear forwards;
pointer-events:none;
}

@keyframes caer{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.final{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
background:black;
}

.final h1{
font-size:4rem;
color:#ff2d75;
text-shadow:
0 0 10px #ff2d75,
0 0 20px #ff2d75,
0 0 40px #ff2d75;
}

.final p{
font-size:1.5rem;
margin-top:15px;
}

</style>
</head>

<body>

    <audio id="musica" controls loop>
        <source src="musica.mp3" type="audio/mpeg">
        </audio>

<div class="container">

<div class="titulo">
Chaparrita ❤️
</div>

<div class="sub">
Tengo algo muy especial que decirte...
</div>

<div class="foto">
<img src="foto.jpg">
</div>

<div class="mensaje" id="mensaje">
Tu sonrisa ilumina mis días ✨
</div>

<div class="pregunta">
¿Quieres seguir creando recuerdos conmigo? 💕
</div>

<button id="si">Sí ❤️</button>
<button id="no">No 😅</button>

</div>

<script>

const mensajes=[
"Tu sonrisa ilumina mis días ✨",
"Eres mi lugar favorito ❤️",
"Gracias por existir 🌹",
"Contigo todo es mejor 💕",
"Chaparrita, te quiero muchísimo ❤️"
];

let i=0;

setInterval(()=>{
i=(i+1)%mensajes.length;
document.getElementById("mensaje").innerHTML=mensajes[i];
},2500);

document.getElementById("si").onclick=()=>{
document.getElementById("musica").play();

document.body.innerHTML=`

<div class="final">

<h1>❤️Chaparrita❤️</h1>

<p>Sabía que dirías que sí ✨</p>

<p>Gracias por cada sonrisa.</p>

<p>Gracias por existir.</p>

<p>Te quiero muchísimo 💕</p>

</div>

`;

};

const no=document.getElementById("no");

function mover(){

const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-80);

no.style.position="fixed";
no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseover",mover);
no.addEventListener("touchstart",mover);

function crearCorazon(){

const c=document.createElement("div");

c.classList.add("corazon");

c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

c.style.fontSize=
(Math.random()*25+15)+"px";

c.style.animationDuration=
(Math.random()*4+3)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);

}

setInterval(crearCorazon,120);

</script>

</body>
</html>
